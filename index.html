<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta name="color-scheme" content="dark">

    <title>G on the internet’s links</title>


    <!-- Browser tab icons -->
    <!-- Change v=4 to v=5 later if you replace the favicon again. -->
    <link
        rel="icon"
        type="image/png"
        href="./images/favicon.png?v=4"
    >

    <link
        rel="shortcut icon"
        type="image/png"
        href="./images/favicon.png?v=4"
    >

    <link
        rel="apple-touch-icon"
        href="./images/favicon.png?v=4"
    >


    <!-- Discord and social-media preview -->
    <meta
        property="og:title"
        content="G on the internet’s links"
    >

    <meta
        property="og:type"
        content="website"
    >

    <meta
        property="og:url"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/"
    >

    <meta
        property="og:image"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png"
    >

    <meta
        property="og:image:secure_url"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png"
    >

    <meta
        property="og:image:type"
        content="image/png"
    >

    <meta
        property="og:image:width"
        content="1200"
    >

    <meta
        property="og:image:height"
        content="630"
    >

    <meta
        property="og:image:alt"
        content="G on the internet’s links"
    >


    <!-- X/Twitter preview -->
    <meta
        name="twitter:card"
        content="summary_large_image"
    >

    <meta
        name="twitter:title"
        content="G on the internet’s links"
    >

    <meta
        name="twitter:image"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png"
    >


    <!-- Main stylesheet -->
    <link
        rel="stylesheet"
        href="./css/style.css"
    >
</head>

<body>

    <main class="container">

        <!-- Profile header -->
        <section class="profile">

            <img
                class="profile-image"
                src="./images/profile.png"
                alt="G's profile picture"
            >

            <h1 class="title">
                G on the internet’s links
            </h1>

        </section>


        <!-- Link cards are generated by main.js -->
        <section
            class="links"
            id="links"
            aria-label="G's links"
        ></section>


        <!-- Global visitor counter -->
        <div
            class="visitor-count"
            aria-label="Total website visits"
        >
            <span>Visited</span>

            <span
                id="visitor-number"
                aria-live="polite"
            >
                loading…
            </span>

            <span>times</span>
        </div>


        <footer>
            G
        </footer>

    </main>


    <!-- Website scripts: keep this order -->
    <script src="./js/links.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/effects.js"></script>


    <!--
        Wait for GoatCounter to load, then display the total count.

        path: "TOTAL" means the number represents visits across the
        whole GoatCounter site instead of only one URL path.
    -->
    <script>
        (() => {
            const visitorNumber =
                document.getElementById("visitor-number");

            let attempts = 0;
            const maximumAttempts = 100;

            const waitForGoatCounter = window.setInterval(() => {
                attempts += 1;

                if (
                    window.goatcounter &&
                    typeof window.goatcounter.visit_count === "function"
                ) {
                    window.clearInterval(waitForGoatCounter);

                    visitorNumber.textContent = "";

                    window.goatcounter.visit_count({
                        append: "#visitor-number",
                        path: "TOTAL",
                        type: "html",
                        no_branding: true,
                        style: `
                            div {
                                display: inline;
                                width: auto;
                                height: auto;
                                min-width: 0;
                                padding: 0;
                                margin: 0;
                                border: 0;
                                border-radius: 0;
                                background: transparent;
                                color: inherit;
                                font: inherit;
                                line-height: inherit;
                                box-shadow: none;
                            }

                            #gcvc-for,
                            #gcvc-by {
                                display: none;
                            }

                            #gcvc-views {
                                display: inline;
                                color: inherit;
                                font: inherit;
                                line-height: inherit;
                            }
                        `
                    });

                    return;
                }

                if (attempts >= maximumAttempts) {
                    window.clearInterval(waitForGoatCounter);
                    visitorNumber.textContent = "unavailable";

                    console.error(
                        "GoatCounter did not load. Check the tracking script and GoatCounter site settings."
                    );
                }
            }, 100);
        })();
    </script>


    <!-- GoatCounter analytics and visitor-count library -->
    <script
        data-goatcounter="https://gontheinternet.goatcounter.com/count"
        async
        src="https://gc.zgo.at/count.js"
    ></script>

</body>
</html>
