<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta name="color-scheme" content="dark">

    <title>G on the internet’s links</title>

    <!-- Add a class early so reveal effects do not flash on load. -->
    <script>
        document.documentElement.classList.add("js");
    </script>

    <!-- Browser tab icons -->
    <link
        rel="icon"
        type="image/png"
        href="./images/favicon.png?v=7"
    >

    <link
        rel="shortcut icon"
        type="image/png"
        href="./images/favicon.png?v=7"
    >

    <link
        rel="apple-touch-icon"
        href="./images/favicon.png?v=7"
    >

    <!-- Discord/Open Graph preview -->
    <meta
        property="og:title"
        content="G on the internet’s links"
    >

    <meta
        property="og:type"
        content="website"
    >

    <meta
        property="og:url"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/"
    >

    <meta
        property="og:image"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png"
    >

    <meta
        property="og:image:secure_url"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png"
    >

    <meta
        property="og:image:type"
        content="image/png"
    >

    <meta
        property="og:image:width"
        content="1200"
    >

    <meta
        property="og:image:height"
        content="630"
    >

    <meta
        property="og:image:alt"
        content="G on the internet’s links"
    >

    <!-- X/Twitter preview -->
    <meta
        name="twitter:card"
        content="summary_large_image"
    >

    <meta
        name="twitter:title"
        content="G on the internet’s links"
    >

    <meta
        name="twitter:image"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png"
    >

    <!-- Lenis recommended stylesheet -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/lenis@1.3.25/dist/lenis.css"
    >

    <!-- Main stylesheet -->
    <link
        rel="stylesheet"
        href="./css/style.css?v=11"
    >
</head>

<body>

    <!-- Fixed decorative background -->
    <div class="background-scene" aria-hidden="true">
        <div class="background-layer background-layer-back">
            <span class="ambient-orb ambient-orb-one"></span>
            <span class="ambient-orb ambient-orb-two"></span>
            <span class="ambient-orb ambient-orb-three"></span>
        </div>

        <div class="background-layer background-layer-middle">
            <span class="contour contour-one"></span>
            <span class="contour contour-two"></span>
            <span class="contour contour-three"></span>
        </div>

        <div class="background-layer background-layer-front"></div>
    </div>

    <!-- Desktop-only cursor light -->
    <div class="cursor-spotlight" aria-hidden="true"></div>

    <main class="container">

        <!-- Profile header -->
        <section class="profile">
            <div class="profile-visual">
                <div
                    class="profile-particles"
                    id="profile-particles"
                    aria-hidden="true"
                ></div>

                <img
                    class="profile-image"
                    src="./images/profile.png"
                    alt="G's profile picture"
                >
            </div>

            <h1 class="title">
                G on the internet’s links
            </h1>
        </section>


        <!-- Live Spotify status; hidden automatically when nothing is playing -->
        <a
            class="now-playing"
            id="now-playing"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Currently playing on Spotify"
            aria-hidden="true"
            hidden
        >
            <div class="now-playing-art-wrap">
                <img
                    class="now-playing-art"
                    id="now-playing-art"
                    alt=""
                >

                <span
                    class="now-playing-equalizer"
                    aria-hidden="true"
                >
                    <i></i>
                    <i></i>
                    <i></i>
                </span>
            </div>

            <div class="now-playing-details">
                <span class="now-playing-label">
                    Now playing on Spotify
                </span>

                <strong
                    class="now-playing-title"
                    id="now-playing-title"
                ></strong>

                <span
                    class="now-playing-artist"
                    id="now-playing-artist"
                ></span>

                <span
                    class="now-playing-progress"
                    aria-hidden="true"
                >
                    <span
                        class="now-playing-progress-fill"
                        id="now-playing-progress-fill"
                    ></span>
                </span>
            </div>

            <span
                class="now-playing-open"
                aria-hidden="true"
            >↗</span>
        </a>


        <!-- Steam cards are created here while an account is in-game -->
        <section
            class="steam-playing-list"
            id="steam-playing-list"
            aria-label="Currently playing on Steam"
            hidden
        ></section>

        <!-- Link cards are generated by main.js -->
        <section
            class="links"
            id="links"
            aria-label="G's links"
        ></section>

        <!-- Custom-styled global visitor counter -->
        <div
            class="visitor-count reveal-item reveal-footer"
            aria-label="Total website visits"
        >
            <span>Visited</span>

            <span
                id="visitor-number"
                aria-live="polite"
            >—</span>

            <span>times</span>
        </div>

        <footer class="reveal-item reveal-footer">
            G
        </footer>

    </main>

    <!-- Lenis smooth scrolling -->
    <script src="https://unpkg.com/lenis@1.3.25/dist/lenis.min.js"></script>

    <!-- Site scripts: keep this order -->
    <script src="./js/links.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/effects.js?v=9"></script>
    <script src="./js/now-playing.js?v=1"></script>
    <script src="./js/steam-status.js?v=1"></script>

    <!--
        Load GoatCounter's JSON total directly.
        This avoids GoatCounter's default embedded counter.
    -->
    <script>
        async function loadVisitorCount() {
            const visitorNumber =
                document.getElementById("visitor-number");

            if (!visitorNumber) {
                return;
            }

            try {
                const response = await fetch(
                    "https://gontheinternet.goatcounter.com/counter/TOTAL.json",
                    {
                        method: "GET",
                        cache: "no-store"
                    }
                );

                if (!response.ok) {
                    throw new Error(
                        `GoatCounter returned HTTP ${response.status}`
                    );
                }

                const data = await response.json();

                if (
                    typeof data.count !== "string" &&
                    typeof data.count !== "number"
                ) {
                    throw new Error(
                        "GoatCounter response did not contain a count."
                    );
                }

                visitorNumber.textContent = data.count;
            } catch (error) {
                console.error(
                    "Could not load the visible visitor count:",
                    error
                );

                visitorNumber.textContent = "—";
            }
        }

        loadVisitorCount();
    </script>

    <!-- GoatCounter analytics -->
    <script
        data-goatcounter="https://gontheinternet.goatcounter.com/count"
        async
        src="https://gc.zgo.at/count.js"
    ></script>

</body>
</html>
