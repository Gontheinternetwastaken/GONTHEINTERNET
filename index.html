<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">

    <title>G on the internet’s links</title>

    <link rel="icon" type="image/png" href="./images/favicon.png?v=6">
    <link rel="shortcut icon" type="image/png" href="./images/favicon.png?v=6">
    <link rel="apple-touch-icon" href="./images/favicon.png?v=6">

    <meta property="og:title" content="G on the internet’s links">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/">
    <meta property="og:image" content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png">
    <meta property="og:image:secure_url" content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="G on the internet’s links">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="G on the internet’s links">
    <meta name="twitter:image" content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png">

    <link rel="stylesheet" href="./css/style.css?v=6">
</head>

<body>
    <main class="container">
        <section class="profile">
            <img
                class="profile-image"
                src="./images/profile.png"
                alt="G's profile picture"
            >

            <h1 class="title">G on the internet’s links</h1>
        </section>

        <section
            class="links"
            id="links"
            aria-label="G's links"
        ></section>

        <div
            class="visitor-count"
            aria-label="Total website visits"
        >
            <span>Visited</span>
            <span id="visitor-number" aria-live="polite">—</span>
            <span>times</span>
        </div>

        <footer>G</footer>
    </main>

    <script src="./js/links.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/effects.js"></script>

    <script>
        async function loadVisitorCount() {
            const visitorNumber = document.getElementById("visitor-number");

            if (!visitorNumber) {
                return;
            }

            try {
                const response = await fetch(
                    "https://gontheinternet.goatcounter.com/counter/TOTAL.json",
                    {
                        method: "GET",
                        cache: "no-store"
                    }
                );

                if (!response.ok) {
                    throw new Error(
                        `GoatCounter returned HTTP ${response.status}`
                    );
                }

                const data = await response.json();

                if (
                    typeof data.count !== "string" &&
                    typeof data.count !== "number"
                ) {
                    throw new Error(
                        "GoatCounter response did not contain a count."
                    );
                }

                visitorNumber.textContent = data.count;
            } catch (error) {
                console.error(
                    "Could not load the visible visitor count:",
                    error
                );

                visitorNumber.textContent = "—";
            }
        }

        loadVisitorCount();
    </script>

    <script
        data-goatcounter="https://gontheinternet.goatcounter.com/count"
        async
        src="https://gc.zgo.at/count.js"
    ></script>
</body>
</html>
