<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta name="color-scheme" content="dark">

    <title>G on the internet’s links</title>


    <!-- Browser tab icon -->
    <!-- The version number helps bypass cached favicon files. -->
    <link
        rel="icon"
        type="image/png"
        href="./images/favicon.png?v=3"
    >

    <link
        rel="shortcut icon"
        type="image/png"
        href="./images/favicon.png?v=3"
    >

    <link
        rel="apple-touch-icon"
        href="./images/favicon.png?v=3"
    >


    <!-- Discord and social-media preview -->
    <meta
        property="og:title"
        content="G on the internet’s links"
    >

    <meta
        property="og:type"
        content="website"
    >

    <meta
        property="og:url"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/"
    >

    <meta
        property="og:image"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png"
    >

    <meta
        property="og:image:width"
        content="1200"
    >

    <meta
        property="og:image:height"
        content="630"
    >

    <meta
        property="og:image:alt"
        content="G on the internet’s links"
    >


    <!-- X/Twitter preview -->
    <meta
        name="twitter:card"
        content="summary_large_image"
    >

    <meta
        name="twitter:title"
        content="G on the internet’s links"
    >

    <meta
        name="twitter:image"
        content="https://gontheinternetwastaken.github.io/GONTHEINTERNET/images/preview.png"
    >


    <!-- Main stylesheet -->
    <link
        rel="stylesheet"
        href="./css/style.css"
    >
</head>


<body>

    <main class="container">

        <!-- Profile header -->
        <section class="profile">

            <img
                class="profile-image"
                src="./images/profile.png"
                alt="G's profile picture"
            >

            <h1 class="title">
                G on the internet’s links
            </h1>

        </section>


        <!-- Link cards are inserted here by main.js -->
        <section
            class="links"
            id="links"
            aria-label="G's links"
        ></section>


        <!-- Global visitor counter -->
        <div
            class="visitor-count"
            aria-label="Website visitor count"
            style="
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.35em;
            "
        >
            <span>Visited</span>

            <div
                class="counterapi"
                ns="gontheinternetwastaken.github.io"
                action="view"
                key="GONTHEINTERNET-homepage"
                noCss="true"
                noIcon="true"
                noLink="true"
                noAnim="true"
                style="
                    display: inline-block;
                    min-width: 1ch;
                "
            ></div>

            <span>times</span>
        </div>


        <footer>
            G
        </footer>

    </main>


    <!-- CounterAPI -->
    <script
        src="https://counterapi.com/c.js"
        async
    ></script>


    <!-- Website scripts: keep this order -->
    <script src="./js/links.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/effects.js"></script>

</body>

</html>
